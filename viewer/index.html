<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXI4 Interconnect — 3D Diagram</title>

  <!--
    Three.js vendor files are served from /vendor/ (copied during Docker build).
    The importmap lets ES-module bare specifiers ("three", "three/addons/…")
    resolve to those local paths so no internet access is needed at runtime.
  -->
  <script type="importmap">
  {
    "imports": {
      "three":          "./vendor/three/build/three.module.js",
      "three/addons/":  "./vendor/three/examples/jsm/"
    }
  }
  </script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Top bar ──────────────────────────────────────────────── -->
  <header id="topbar">
    <span id="design-title">3D Diagram Viewer</span>
    <span id="design-subtitle">UVC & DMA Diagrams</span>

    <!-- Design selector -->
    <select id="design-select" title="Choose design">
      <optgroup label="Protocol UVCs">
        <option value="metadata/uvc_axi4.json">AXI4 UVC</option>
        <option value="metadata/uvc_ahb.json">AHB UVC</option>
        <option value="metadata/uvc_apb.json">APB UVC</option>
        <option value="metadata/uvc_uart.json">UART UVC</option>
      </optgroup>
      <optgroup label="DMA Modules">
        <option value="metadata/dma_axi32_design.json">DMA AXI 32</option>
        <option value="metadata/dma_axi64_design.json">DMA AXI 64</option>
      </optgroup>
      <optgroup label="Testbenches">
        <option value="metadata/dma_axi64_testbench.json">DMA AXI 64 TB (2×AXI4 Slave + APB Master)</option>
      </optgroup>
    </select>

    <button id="btn-overview" title="Design overview">ℹ️</button>
    <span id="controls-hint">🖱 Drag to orbit · Scroll to zoom · Right-drag to pan</span>
  </header>

  <!-- ── Overview overlay (design info, legend, parameters) ──── -->
  <div id="overview-overlay" class="overlay hidden">
    <div class="overlay-content">
      <button class="overlay-close" data-close="overview-overlay">✕</button>
      <h2 id="panel-design-name">Loading…</h2>
      <p  id="panel-desc"></p>

      <section class="panel-section">
        <h3>Instances</h3>
        <ul id="instance-list"></ul>
      </section>

      <section class="panel-section">
        <h3>Legend</h3>
        <ul id="legend"></ul>
      </section>

      <section class="panel-section">
        <h3>Parameters</h3>
        <table id="param-table"></table>
      </section>
    </div>
  </div>

  <!-- ── Info popup (shows on click of box / connection) ──────── -->
  <div id="info-popup" class="popup collapsed">
    <div class="popup-handle" id="popup-handle">
      <span class="popup-hint">Click a box or connection for details</span>
      <button class="popup-toggle" id="popup-toggle" title="Close">✕</button>
    </div>
    <div class="popup-body" id="popup-body"></div>
  </div>

  <!-- ── Loading overlay (shown while designs load) ────────────── -->
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading diagram…</div>
  </div>

  <!-- ── Three.js canvas fills the viewport ───────────────────── -->
  <canvas id="canvas"></canvas>

  <script type="module" src="main.js"></script>
</body>
</html>
