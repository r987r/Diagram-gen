<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXI4 Interconnect — 3D Diagram</title>

  <!--
    Three.js vendor files are served from /vendor/ (copied during Docker build).
    The importmap lets ES-module bare specifiers ("three", "three/addons/…")
    resolve to those local paths so no internet access is needed at runtime.
  -->
  <script type="importmap">
  {
    "imports": {
      "three":          "./vendor/three/build/three.module.js",
      "three/addons/":  "./vendor/three/examples/jsm/"
    }
  }
  </script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Top bar ──────────────────────────────────────────────── -->
  <header id="topbar">
    <span id="design-title">AXI4 Interconnect</span>
    <span id="design-subtitle">Master → Repeater → Slave</span>

    <!-- Design selector -->
    <select id="design-select" title="Choose design">
      <optgroup label="Full Designs">
        <option value="metadata/axi4_design.json">AXI4 M→R→S</option>
        <option value="metadata/axi4_wide_interconnect.json">Wide Interconnect</option>
        <option value="metadata/uvm_testbench.json">UVM Testbench</option>
        <option value="metadata/uvm_axi4_super.json">UVM + Interconnect (Super)</option>
      </optgroup>
      <optgroup label="Individual UVC Views">
        <option value="metadata/uvm_cpu_uvc.json">CPU UVC</option>
        <option value="metadata/uvm_dma_uvc.json">DMA UVC</option>
        <option value="metadata/uvm_gpu_uvc.json">GPU UVC</option>
        <option value="metadata/uvm_sram_uvc.json">SRAM UVC</option>
        <option value="metadata/uvm_ddr_uvc.json">DDR UVC</option>
        <option value="metadata/uvm_uart_uvc.json">UART UVC</option>
        <option value="metadata/uvm_spi_uvc.json">SPI UVC</option>
      </optgroup>
    </select>

    <button id="btn-overview" title="Design overview">ℹ️</button>
    <span id="controls-hint">🖱 Drag to orbit · Scroll to zoom · Right-drag to pan</span>
  </header>

  <!-- ── Overview overlay (design info, legend, parameters) ──── -->
  <div id="overview-overlay" class="overlay hidden">
    <div class="overlay-content">
      <button class="overlay-close" data-close="overview-overlay">✕</button>
      <h2 id="panel-design-name">Loading…</h2>
      <p  id="panel-desc"></p>

      <section class="panel-section">
        <h3>Instances</h3>
        <ul id="instance-list"></ul>
      </section>

      <section class="panel-section">
        <h3>Legend</h3>
        <ul id="legend"></ul>
      </section>

      <section class="panel-section">
        <h3>Parameters</h3>
        <table id="param-table"></table>
      </section>
    </div>
  </div>

  <!-- ── Info popup (shows on click of box / connection) ──────── -->
  <div id="info-popup" class="popup collapsed">
    <div class="popup-handle" id="popup-handle">
      <span class="popup-hint">Click a box or connection for details</span>
      <button class="popup-toggle" id="popup-toggle" title="Close">✕</button>
    </div>
    <div class="popup-body" id="popup-body"></div>
  </div>

  <!-- ── Three.js canvas fills the viewport ───────────────────── -->
  <canvas id="canvas"></canvas>

  <script type="module" src="main.js"></script>
</body>
</html>
